<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles | Sariful Islam</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#003366;
}

.search-box{
    max-width:500px;
    margin:20px auto;
}

.search-box input{
    width:100%;
    padding:12px;
    border:2px solid #003366;
    border-radius:8px;
    font-size:16px;
}

.article{
    background:white;
    max-width:700px;
    margin:15px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.article h3{
    margin-top:0;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 18px;
    background:#003366;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.btn:hover{
    background:#0055aa;
}
</style>
</head>

<body>

<h1>📚 Articles</h1>

<div class="search-box">
<input type="text" id="search" placeholder="Search Articles..." onkeyup="searchArticle()">
</div>

<div class="article">
<h3>WHY BORN AAMSU (English)</h3>
<a class="btn" href="Why_Born_AAMSU_English.pdf" target="_blank">Read PDF</a>
<a class="btn" href="Why_Born_AAMSU_English.pdf" download>Download</a>
</div>

<div class="article">
<h3>WHY BORN AAMSU (Assamese)</h3>
<a class="btn" href="Why_Born_AAMSU_Assamese.pdf" target="_blank">Read PDF</a>
<a class="btn" href="Why_Born_AAMSU_Assamese.pdf" download>Download</a>
</div>

<script>
function searchArticle(){
let input=document.getElementById("search").value.toLowerCase();
let articles=document.getElementsByClassName("article");

for(let i=0;i<articles.length;i++){
let text=articles[i].innerText.toLowerCase();

if(text.indexOf(input)>-1){
articles[i].style.display="";
}else{
articles[i].style.display="none";
}
}
}
</script>

</body>
</html>
